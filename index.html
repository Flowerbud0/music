    <style>
        /* 保留原有所有样式,以下是新增+微调样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            padding: 30px;
            position: relative;
        }
        .page-title {
            text-align: center;
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .function-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }
        @media (max-width: 768px) {
            .function-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .search-input::placeholder {
            color: #aab7c4;
        }
        .category-select {
            padding: 12px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 16px;
            color: #2c3e50;
            background: #fff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .category-select:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .blind-box-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b8b 0%, #ff4757 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .blind-box-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }
        .blind-box-btn:active {
            transform: translateY(0);
        }
        .song-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            .song-list {
                grid-template-columns: 1fr;
            }
        }
        .song-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
            border-left: 4px solid #4a90e2;
            transition: all 0.3s ease;
        }
        .song-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            background: #fff;
        }
        .song-name {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .song-info {
            display: flex;
            justify-content: space-between;
            color: #6c757d;
            font-size: 14px;
        }
        .song-singer {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .song-category {
            background: #e9ecef;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .no-result {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
            font-size: 18px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .blind-box-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .blind-box-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #fff;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .blind-box-modal.active .modal-content {
            transform: scale(1);
        }
        .modal-title {
            color: #ff4757;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .modal-song {
            margin: 25px 0;
        }
        .modal-song-name {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .modal-song-singer {
            font-size: 18px;
            color: #6c757d;
        }
        .close-modal-btn {
            padding: 10px 24px;
            background: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .close-modal-btn:hover {
            background: #34495e;
        }
        .category-HzOne1 { border-left-color: #4a90e2; }
        .category-Bubble_ls { border-left-color: #9b59b6; }
        .category-瓜呱瓜吖 { border-left-color: #e74c3c; }
       

        /* ============= 新增：分页样式 ============= */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination-btn {
            padding: 8px 16px;
            border: 1px solid #e0e6ed;
            border-radius: 6px;
            background: #fff;
            color: #2c3e50;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .pagination-btn:hover:not(:disabled) {
            border-color: #4a90e2;
            color: #4a90e2;
        }
        .pagination-btn:disabled {
            color: #aab7c4;
            cursor: not-allowed;
            background: #f8f9fa;
        }
        .pagination-btn.active {
            background: #4a90e2;
            color: #fff;
            border-color: #4a90e2;
        }
    </style>
</head>

        // ============= 新增：分页核心全局变量 =============
        let currentPage = 1; // 当前页码,默认第1页
        const pageSize = 20; // 每页显示20条,可自行修改（比如改10/30）
        let filteredSongs = [...allSongs]; // 存储筛选后的歌曲,默认是全部歌曲

        // ========== 2. 核心工具函数 ==========
        // 获取所有分类（去重）
        function getCategories() {
            const categories = new Set();
            allSongs.forEach(song => categories.add(song.category));
            return Array.from(categories);
        }

        // 新增：计算总页数
        function getTotalPages() {
            return Math.ceil(filteredSongs.length / pageSize);
        }

        // 新增：获取当前页需要渲染的歌曲
        function getCurrentPageSongs() {
            const startIndex = (currentPage - 1) * pageSize; // 起始索引
            const endIndex = startIndex + pageSize; // 结束索引
            return filteredSongs.slice(startIndex, endIndex); // 截取数组,返回当前页数据
        }

        // 改造：渲染歌曲列表（适配分页,渲染当前页数据）
        function renderSongList() {
            const songListEl = document.getElementById('songList');
            songListEl.innerHTML = ''; // 清空原有内容
            const displaySongs = getCurrentPageSongs(); // 获取当前页歌曲

            if (displaySongs.length === 0) {
                songListEl.innerHTML = '<div class="no-result">暂无匹配的歌曲~</div>';
                return;
            }

            displaySongs.forEach(song => {
                const li = document.createElement('li');
                li.className = `song-card category-${song.category}`;
                li.innerHTML = `
                    <div class="song-name">${song.name}</div>
                    <div class="song-info">
                        <div class="song-singer">🎤 ${song.singer || '未知歌手'}</div>
                        <div class="song-category">${song.category}</div>
                    </div>
                `;
                songListEl.appendChild(li);
            });
        }

        // 新增：渲染分页按钮（自动生成页码,处理禁用/激活）
        function renderPagination() {
            const paginationEl = document.getElementById('pagination');
            paginationEl.innerHTML = ''; // 清空原有分页
            const totalPages = getTotalPages();

            // 无数据时隐藏分页
            if (totalPages <= 1) {
                paginationEl.style.display = 'none';
                return;
            }
            paginationEl.style.display = 'flex';

            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '上一页';
            prevBtn.disabled = currentPage === 1; // 第1页禁用
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderSongList();
                    renderPagination();
                }
            });
            paginationEl.appendChild(prevBtn);

            // 数字页码按钮（生成所有页码）
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    renderSongList();
                    renderPagination();
                });
                paginationEl.appendChild(pageBtn);
            }

            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = '下一页';
            nextBtn.disabled = currentPage === totalPages; // 最后一页禁用
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderSongList();
                    renderPagination();
                }
            });
            paginationEl.appendChild(nextBtn);
        }

        // 初始化分类下拉框
        function initCategorySelect() {
            const categorySelectEl = document.getElementById('categorySelect');
            const categories = getCategories();
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelectEl.appendChild(option);
            });
        }

        // 随机抽取盲盒歌曲
        function randomSong() {
            const randomIndex = Math.floor(Math.random() * allSongs.length);
            return allSongs[randomIndex];
        }

        // ========== 3. 事件绑定 ==========
        function bindEvents() {
            // 搜索框事件（实时筛选）
            const searchInputEl = document.getElementById('searchInput');
            searchInputEl.addEventListener('input', filterSongs);

            // 分类下拉框事件
            const categorySelectEl = document.getElementById('categorySelect');
            categorySelectEl.addEventListener('change', filterSongs);

            // 盲盒按钮事件
            const blindBoxBtnEl = document.getElementById('blindBoxBtn');
            const blindBoxModalEl = document.getElementById('blindBoxModal');
            const modalSongEl = document.getElementById('modalSong');
            
            blindBoxBtnEl.addEventListener('click', () => {
                const randomSongData = randomSong();
                modalSongEl.innerHTML = `
                    <div class="modal-song-name">${randomSongData.name}</div>
                    <div class="modal-song-singer">${randomSongData.singer || '未知歌手'}</div>
                `;
                blindBoxModalEl.classList.add('active');
            });

            // 关闭弹窗事件
            const closeModalBtnEl = document.getElementById('closeModalBtn');
            closeModalBtnEl.addEventListener('click', () => {
                blindBoxModalEl.classList.remove('active');
            });

            // 点击弹窗外层关闭
            blindBoxModalEl.addEventListener('click', (e) => {
                if (e.target === blindBoxModalEl) {
                    blindBoxModalEl.classList.remove('active');
                }
            });
        }

        // 改造：筛选歌曲（搜索+分类,筛选后重置分页为第1页）
        function filterSongs() {
            const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const selectedCategory = document.getElementById('categorySelect').value;

            // 重新筛选歌曲
            filteredSongs = allSongs.filter(song => {
                const matchCategory = selectedCategory === 'all' || song.category === selectedCategory;
                const matchSearch = song.name.toLowerCase().includes(searchKeyword) || 
                                    song.singer.toLowerCase().includes(searchKeyword);
                return matchCategory && matchSearch;
            });

            currentPage = 1; // 关键：筛选后重置为第1页
            renderSongList(); // 渲染筛选后当前页（第1页）
            renderPagination(); // 重新渲染分页
        }

        // ========== 4. 初始化页面 ==========
        function init() {
            initCategorySelect(); // 初始化分类下拉框
            renderSongList(); // 渲染第1页歌曲
            renderPagination(); // 初始化渲染分页
            bindEvents(); // 绑定所有事件
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
