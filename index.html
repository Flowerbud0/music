        * {

            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            padding: 30px;
            position: relative;
        }
        .page-title {
            text-align: center;
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* ========== 新增：主播选择样式 ========== */
        .anchor-select-area {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .anchor-btn {
            padding: 8px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            background: #fff;
            color: #2c3e50;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .anchor-btn:hover {
            border-color: #4a90e2;
            color: #4a90e2;
        }
        .anchor-btn.active {
            background: #4a90e2;
            color: #fff;
            border-color: #4a90e2;
        }

        .function-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }
        @media (max-width: 768px) {
            .function-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .search-input::placeholder {
            color: #aab7c4;
        }
        .category-select {
            padding: 12px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 16px;
            color: #2c3e50;
            background: #fff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .category-select:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .blind-box-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b8b 0%, #ff4757 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .blind-box-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }
        .blind-box-btn:active {
            transform: translateY(0);
        }
        .song-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            .song-list {
                grid-template-columns: 1fr;
            }
        }
        .song-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
            border-left: 4px solid #4a90e2;
            transition: all 0.3s ease;
        }
        .song-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            background: #fff;
        }
        .song-name {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .song-info {
            display: flex;
            justify-content: space-between;
            color: #6c757d;
            font-size: 14px;
        }
        .song-singer {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .song-category {
            background: #e9ecef;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .no-result {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
            font-size: 18px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .blind-box-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .blind-box-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #fff;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .blind-box-modal.active .modal-content {
            transform: scale(1);
        }
        .modal-title {
            color: #ff4757;
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .modal-song {
            margin: 25px 0;
        }
        .modal-song-name {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .modal-song-singer {
            font-size: 18px;
            color: #6c757d;
        }
        .close-modal-btn {
            padding: 10px 24px;
            background: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;

        }

        }

            color: #4a90e2;
        }
        .pagination-btn:disabled {

            color: #fff;
            border-color: #4a90e2;

        // 1.3 分配主播对应的歌单（可自定义调整）
        const anchorSongMap = {
            "anchor1": allSongs.filter(song => song.category === "飘站歌"), // 主播A：飘站歌
            "anchor2": allSongs.filter(song => song.category === "古风歌"), // 主播B：古风歌
            "anchor3": allSongs.filter(song => song.category === "粤语歌"), // 主播C：粤语歌
            "all": allSongs // 全部主播：所有歌曲
        };

        // ========== 2. 全局状态管理 ==========
        let currentAnchor = "all"; // 默认选中「全部主播」
        let currentPage = 1; // 当前页码
        const pageSize = 12; // 每页显示歌曲数量
        let filteredSongs = []; // 筛选后的歌曲（主播+搜索+分类）

        // ========== 3. 初始化页面 ==========
        initPage();
        function initPage() {
            // 3.1 渲染主播选择按钮
            renderAnchorButtons();
            // 3.2 渲染分类下拉框
            renderCategoryOptions();
            // 3.3 初始化歌曲列表
            updateSongList();
            // 3.4 绑定事件监听
            bindEvents();
        }

        // ========== 4. 渲染主播选择按钮 ==========
        function renderAnchorButtons() {
            const anchorArea = document.getElementById("anchorSelectArea");
            anchorArea.innerHTML = anchors.map(anchor => `
                <button class="anchor-btn ${anchor.id === currentAnchor ? 'active' : ''}" data-anchor-id="${anchor.id}">
                    ${anchor.name}
                </button>
            `).join("");
        }

        // ========== 5. 渲染分类下拉框 ==========
        function renderCategoryOptions() {
            const categorySelect = document.getElementById("categorySelect");
            // 获取所有分类（去重）
            const categories = [...new Set(allSongs.map(song => song.category))];
            // 渲染分类选项
            categorySelect.innerHTML += categories.map(category => `
                <option value="${category}">${category}</option>
            `).join("");
        }

        // ========== 6. 更新歌曲列表（核心逻辑） ==========
        function updateSongList() {
            // 6.1 获取当前主播的歌单
            let anchorSongs = anchorSongMap[currentAnchor] || [];
            // 6.2 应用搜索筛选
            const searchKeyword = document.getElementById("searchInput").value.trim().toLowerCase();
            if (searchKeyword) {
                anchorSongs = anchorSongs.filter(song => 
                    song.name.toLowerCase().includes(searchKeyword) || 
                    song.singer.toLowerCase().includes(searchKeyword)
                );
            }
            // 6.3 应用分类筛选
            const selectedCategory = document.getElementById("categorySelect").value;
            if (selectedCategory !== "all") {
                anchorSongs = anchorSongs.filter(song => song.category === selectedCategory);
            }
            // 6.4 保存筛选后的歌单
            filteredSongs = anchorSongs;
            // 6.5 分页处理
            const totalPages = Math.ceil(filteredSongs.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedSongs = filteredSongs.slice(startIndex, endIndex);
            // 6.6 渲染歌曲列表
            renderSongList(paginatedSongs);
            // 6.7 渲染分页控件
            renderPagination(totalPages);
        }

        // ========== 7. 渲染歌曲列表 ==========
        function renderSongList(songs) {
            const songList = document.getElementById("songList");
            if (songs.length === 0) {
                songList.innerHTML = `<div class="no-result">暂无符合条件的歌曲</div>`;
                return;
            }
            songList.innerHTML = songs.map(song => `
                <li class="song-card category-${song.category}">
                    <div class="song-name">${song.name}</div>
                    <div class="song-info">
                        <div class="song-singer">🎤 ${song.singer}</div>
                        <div class="song-category">${song.category}</div>
                    </div>
                </li>
            `).join("");
        }

        // ========== 8. 渲染分页控件 ==========
        function renderPagination(totalPages) {
            const pagination = document.getElementById("pagination");
            pagination.innerHTML = "";

            // 上一页按钮
            const prevBtn = document.createElement("button");
            prevBtn.className = "pagination-btn";
            prevBtn.textContent = "上一页";
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener("click", () => {
                if (currentPage > 1) {
                    currentPage--;
                    updateSongList();
                }
            });
            pagination.appendChild(prevBtn);

            // 页码按钮（最多显示5个页码）
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement("button");
                pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener("click", () => {
                    currentPage = i;
                    updateSongList();
                });
                pagination.appendChild(pageBtn);
            }

            // 下一页按钮
            const nextBtn = document.createElement("button");
            nextBtn.className = "pagination-btn";
            nextBtn.textContent = "下一页";
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
            nextBtn.addEventListener("click", () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    updateSongList();
                }
            });
            pagination.appendChild(nextBtn);
        }

        // ========== 9. 绑定所有事件 ==========
        function bindEvents() {
            // 9.1 主播选择事件
            document.getElementById("anchorSelectArea").addEventListener("click", (e) => {
                if (e.target.classList.contains("anchor-btn")) {
                    // 切换选中状态
                    document.querySelectorAll(".anchor-btn").forEach(btn => btn.classList.remove("active"));
                    e.target.classList.add("active");
                    // 更新当前主播
                    currentAnchor = e.target.dataset.anchorId;
                    // 重置页码
                    currentPage = 1;
                    // 更新歌曲列表
                    updateSongList();
                }
            });

            // 9.2 搜索框事件
            document.getElementById("searchInput").addEventListener("input", () => {
                currentPage = 1;
                updateSongList();
            });

            // 9.3 分类选择事件
            document.getElementById("categorySelect").addEventListener("change", () => {
                currentPage = 1;
                updateSongList();
            });

            // 9.4 盲盒按钮事件
            document.getElementById("blindBoxBtn").addEventListener("click", () => {
                if (filteredSongs.length === 0) {
                    alert("暂无可抽取的歌曲");
                    return;
                }
                // 随机抽取一首
                const randomSong = filteredSongs[Math.floor(Math.random() * filteredSongs.length)];
                // 渲染盲盒弹窗
                document.getElementById("modalSong").innerHTML = `
                    <div class="modal-song-name">${randomSong.name}</div>
                    <div class="modal-song-singer">${randomSong.singer}</div>
                `;
                // 显示弹窗
                document.getElementById("blindBoxModal").classList.add("active");
            });

            // 9.5 关闭盲盒弹窗
            document.getElementById("closeModalBtn").addEventListener("click", () => {
                document.getElementById("blindBoxModal").classList.remove("active");
            });

            // 9.6 点击弹窗外部关闭
            document.getElementById("blindBoxModal").addEventListener("click", (e) => {
                if (e.target === document.getElementById("blindBoxModal")) {
                    document.getElementById("blindBoxModal").classList.remove("active");
                }
            });
        }
    </script>
</body>
